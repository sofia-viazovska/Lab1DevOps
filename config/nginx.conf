# /etc/nginx/sites-available/mywebapp
#
# Reverse proxy for mywebapp. Only the root endpoint and the business-logic
# endpoints (/tasks, /tasks/<id>/done) are exposed to clients — health probes
# remain reachable only on the loopback interface of the VM.

upstream mywebapp_backend {
    server 127.0.0.1:3000;
}

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/mywebapp_access.log;
    error_log  /var/log/nginx/mywebapp_error.log;

    # Root endpoint (text/html, list of business endpoints)
    location = / {
        proxy_pass http://mywebapp_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GET /tasks, POST /tasks
    location = /tasks {
        proxy_pass http://mywebapp_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # POST /tasks/<id>/done — only this sub-path is exposed
    location ~ ^/tasks/[0-9]+/done$ {
        proxy_pass http://mywebapp_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block everything else — health probes, docs, anything not in the spec
    location / {
        return 404;
    }
}
